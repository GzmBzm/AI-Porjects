<!DOCTYPE html>
<html>
<head>
    <title>Weather API Test</title>
</head>
<body>
    <h1>Weather API Test</h1>
    <div id="output"></div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.7833&longitude=30.4000&current=temperature_2m,wind_speed_10m,relative_humidity_2m,apparent_temperature&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code&timezone=auto');
                const data = await response.json();
                document.getElementById('output').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('output').innerHTML = 'Error: ' + error.message;
            }
        }

        testAPI();
    </script>
</body>
